<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#121212" />
    <title>PresupuestoApp</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="manifest" href="/manifest.webmanifest">
    
    <!-- Dependencies for new features -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  </head>
  <body>
    <div id="app"></div>
    
    <!-- Hidden File Inputs -->
    <input type="file" accept="image/*" capture="environment" id="receiptInput" style="position: absolute; width: 1px; height: 1px; opacity: 0; overflow: hidden; z-index: -1;">
    <input type="file" accept=".csv" id="csvInput" style="position: absolute; width: 1px; height: 1px; opacity: 0; overflow: hidden; z-index: -1;">

    <!-- CSV Mapping Modal -->
    <div class="modal-overlay" id="csv-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title">Mapear Columnas CSV</h2>
          <button class="modal-close" id="close-csv-modal"><i class="ph ph-x"></i></button>
        </div>
        <p style="margin-bottom: 16px; font-size: 0.9rem; color: var(--text-secondary);">Detectamos las siguientes columnas. Por favor, asigne cada una al campo correcto de la transacción.</p>
        <div class="card glass mb-4" style="padding: 12px; font-family: monospace; font-size: 0.85rem; overflow-x: auto; white-space: nowrap;" id="csv-preview">
          <!-- Preview data will go here -->
        </div>
        <form id="csv-form">
          <div class="form-group flex justify-between" style="gap: 10px;">
            <div class="w-100">
              <label>Columna de Fecha</label>
              <select class="form-control" id="csv-col-date" required></select>
            </div>
            <div class="w-100">
              <label>Columna de Monto</label>
              <select class="form-control" id="csv-col-amount" required></select>
            </div>
          </div>
          <div class="form-group">
            <label>Columna de Comercio/Descripción</label>
            <select class="form-control" id="csv-col-merchant" required></select>
          </div>
          <div class="form-group">
            <label>Cuenta</label>
            <select class="form-control" id="csv-account" required></select>
          </div>
          <button type="submit" class="btn btn-primary w-100 mt-4">Importar Transacciones</button>
        </form>
      </div>
    </div>

    <!-- Loading Overlay for OCR -->
    <div class="modal-overlay" id="loading-overlay" style="z-index: 10000;">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
        <i class="ph ph-spinner-gap" style="font-size: 3rem; color: var(--accent-primary); animation: spin 1s linear infinite;"></i>
        <h3 style="margin-top: 16px;" id="loading-text">Procesando...</h3>
      </div>
    </div>

    <style>
      @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
